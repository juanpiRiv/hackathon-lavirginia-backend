services:
  db:
    image: postgres:16-alpine
    container_name: lavirginia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lavirginia_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lavirginia_backend"]
      interval: 5s
      timeout: 3s
      retries: 20

  python-model:
    build:
      context: ./capsule_qc_mvp
      dockerfile: Dockerfile
    container_name: lavirginia-python-model
    restart: unless-stopped
    environment:
      CAPSULE_QC_ALLOW_MISSING_MODEL: "true"
      CAPSULE_QC_MODEL_PATH: artifacts/current
    volumes:
      - ./capsule_qc_mvp/artifacts:/app/artifacts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavirginia-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lavirginia_backend?schema=public
      JWT_SECRET: cambia-este-secreto
      VALIDATOR_API_KEY: validator-dev-key
      AI_GATEWAY_URL: https://opencode.ai/zen/go/v1/chat/completions
      AI_GATEWAY_API_KEY: PONER_ACA_TU_OPENCODE_KEY
      AI_GATEWAY_MODEL: opencode-go/kimi-k2.6
      AI_GATEWAY_TIMEOUT_MS: 30000
      MAX_IMAGE_SIZE_MB: 10
      PYTHON_MODEL_URL: http://python-model:8000
      PYTHON_MODEL_TIMEOUT_MS: 5000
      PYTHON_MODEL_MODE: direct
    ports:
      - "3001:3000"

volumes:
  postgres_data:
